<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css">
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

    <title>French Poem Generator</title>
</head>
<body>
    <section class="hero">
        <div class="container">
            <h1>
            AI French Poem Generator 
            </h1> 

            <div class="main-part">

                <form class="submit-form" id="poem-generator-form">
                <input type="text" class="theme-input" placeholder="What is the poem about?" 
                autofocus
                required
                autocomplete="off"
                id = "user-instructions"
                />
                 <input type="submit" class="submit1" value="Submit"/>
                </form>

                 <div class="poem-text" id="poem">
                 
                 </div>
            </div>
            <footer>
             Coded by <a href="https://github.com/natalia-panagi" target="_blank">Natalia P</a>  - 
            Open-sourced on <a href="https://github.com/natalia-panagi/French-Poems-Generator" target="_blank">GitHub</a> - 
            Hosted on <a href="https://french-poem-generate.netlify.app/" target="_blank">Netlify</a>
            </footer> 
        </div>
    </section>

     
   
    <script src="src/index.js" defer></script>
</body>
</html>
