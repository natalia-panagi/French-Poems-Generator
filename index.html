<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css">
    <title>French Poem Generator</title>
</head>
<body>
    <section class="hero">
        <h1>
       Welcome to the French Poem Generator! 
        </h1> 
        <form>
            <input type="text" placeholder="What is the poem about?" 
            autofocus
            required
            autocompete="off"
            />
            <input type="submit" value="Submit"/>
        </form>
        <div class="poem-text">
            Elle est retrouvée.<br/>
            Quoi? - L'Éternité.<br/>
            C'est la mer allée <br/>
            Avec le soleil.
        </div>

        <footer>
        Coded by <a href="https://github.com/natalia-panagi" target="_blank">Natalia P</a>  - 
        Open-sourced on <a href="https://github.com/natalia-panagi/French-Poems-Generator" target="_blank">GitHub</a> - 
        Hosted on <a href="https://french-poem-generate.netlify.app/" target="_blank">Netlify</a>
        </footer> 
    </section>

     
   
    <script src="src/index.js"></script>
</body>
</html>
